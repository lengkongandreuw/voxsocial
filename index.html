<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox Social Media Score - Digital Business Health Report</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Konfigurasi tema Tailwind untuk layout modern bernuansa ungu gelap (Deep Violet) sesuai mockup
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vox: {
                            bg: '#3b26be', // Gradasi atas mockup
                            bgBottom: '#170a70', // Gradasi bawah mockup
                            btn: '#191046', // Tombol gelap dengan kontras tinggi
                            accent: '#4324c4',
                        },
                        brand: {
                            DEFAULT: '#0f172a',
                            light: '#334155',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                        brush: ['Caveat Brush', 'Caveat', 'cursive'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Caveat+Brush&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Three.js CDN untuk efek latar belakang 3D partikel bintang halus -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #170a70;
            color: #ffffff;
            overflow-x: hidden;
        }
        /* Kustomisasi scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #170a70; }
        ::-webkit-scrollbar-thumb { background: #3b26be; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a34e0; }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="antialiased">

    <!-- React Root -->
    <div id="root"></div>

    <!-- React and Babel CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.10/babel.min.js" crossorigin></script>

    <!-- Kode Utama Aplikasi React -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Konfigurasi API
        const apiKey = ""; 

        // URL Aset Gambar & SVG Sesuai Instruksi Mockup
        const MASCOT_URL = "https://raw.githubusercontent.com/lengkongandreuw/voxsocial/main/assets/ryanvox_large.png";
        const LOGO_URL = "https://raw.githubusercontent.com/lengkongandreuw/voxsocial/main/assets/vsllogo.png";
        const HEADLINE_SVG_URL = "https://raw.githubusercontent.com/lengkongandreuw/voxsocial/main/assets/headlinevoxscore.svg";

        // --- KOMPONEN LATAR BELAKANG THREE.JS ---
        const ThreeBackground = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const scene = new THREE.Scene();
                // Menyelaraskan warna kabut luar dengan bagian bawah gradasi linear mockup (#170a70)
                scene.fog = new THREE.FogExp2(0x170a70, 0.0018);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 30;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mountRef.current.appendChild(renderer.domElement);

                // Grid sistem partikel bintang luar angkasa
                const geometry = new THREE.BufferGeometry();
                const particlesCount = 100;
                const posArray = new Float32Array(particlesCount * 3);

                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 80;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.15,
                    color: 0x38bdf8,
                    transparent: true,
                    opacity: 0.4,
                    blending: THREE.AdditiveBlending
                });

                const particlesMesh = new THREE.Points(geometry, material);
                scene.add(particlesMesh);

                let mouseX = 0;
                let mouseY = 0;
                
                const handleMouseMove = (e) => {
                    mouseX = (e.clientX / window.innerWidth) - 0.5;
                    mouseY = (e.clientY / window.innerHeight) - 0.5;
                };
                window.addEventListener('mousemove', handleMouseMove);

                const animate = () => {
                    requestAnimationFrame(animate);
                    particlesMesh.rotation.y += 0.0002;
                    particlesMesh.rotation.x += 0.0001;
                    
                    particlesMesh.position.x += (mouseX * 3 - particlesMesh.position.x) * 0.05;
                    particlesMesh.position.y += (-mouseY * 3 - particlesMesh.position.y) * 0.05;

                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('resize', handleResize);
                    mountRef.current?.removeChild(renderer.domElement);
                    geometry.dispose();
                    material.dispose();
                    renderer.dispose();
                };
            }, []);

            return <div id="canvas-container" ref={mountRef}></div>;
        };

        function App() {
            const [view, setView] = useState('landing'); 
            const [profileUrl, setProfileUrl] = useState('');
            const [inputError, setInputError] = useState('');
            const [analyzingStep, setAnalyzingStep] = useState(0);
            const [analysisResults, setAnalysisResults] = useState(null);

            const analysisSteps = [
                "Connecting to public profile...",
                "Analyzing Profile Clarity & Description...",
                "Checking Visual Quality & Content Consistency...",
                "Evaluating Trust Signals & Website Presence...",
                "Measuring Customer Contact Readiness...",
                "Compiling Final Score and Growth Recommendations..."
            ];

            useEffect(() => {
                let interval;
                if (view === 'loading') {
                    setAnalyzingStep(0);
                    interval = setInterval(() => {
                        setAnalyzingStep((prev) => {
                            if (prev < analysisSteps.length - 1) {
                                return prev + 1;
                            } else {
                                clearInterval(interval);
                                return prev;
                            }
                        });
                    }, 1200);
                }
                return () => clearInterval(interval);
            }, [view]);

            const detectPlatform = (url) => {
                const lower = url.toLowerCase();
                if (lower.includes('instagram.com')) return 'Instagram';
                return 'Social Media Profile';
            };

            const handleAnalyze = async (e) => {
                e.preventDefault();
                setInputError('');

                const url = profileUrl.trim();
                if (!url) return;

                // Verifikasi awal: Cek format URL & batasi hanya untuk domain Instagram
                const isUrl = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?(\?.*)?$/.test(url);
                const isInstagram = url.toLowerCase().includes('instagram.com') || url.toLowerCase().includes('instagr.am');

                if (!isUrl) {
                    setInputError("Please enter a valid URL address.");
                    return;
                }

                if (!isInstagram) {
                    setInputError("Audit restricted to Instagram links only. Please enter a valid Instagram profile URL.");
                    return;
                }

                setView('loading');
                const platform = 'Instagram';
                
                const systemPrompt = `You are a senior digital business auditor evaluating social media profiles for non-technical conventional business owners (aged 40-65).
Use SIMPLE, friendly, professional, and easy-to-understand ENGLISH.
Output format must be pure JSON with the following structure without extra markdown:
{
  "businessName": "Detected Business Name or Handle from URL",
  "profileIdentity": "One single sentence summarizing exactly WHO this profile is or what business they do (e.g., 'This profile belongs to a local coffee shop offering artisanal blends.').",
  "score": 40-95,
  "label": "Excellent" (90-100) or "Very Good" (80-89) or "Good" (70-79) or "Fair" (60-69) or "Needs Attention" (below 60),
  "summary": "One friendly summary line highlighting potential and main improvement areas (max 100 chars).",
  "strengths": ["Max 3 main strengths in English starting with a checkmark (✓)."],
  "opportunities": ["Max 3 improvement opportunities starting with a bullet (•)."],
  "recommendations": ["3 actionable recommendations. Each MUST be ONE sentence with a maximum of 20 words."],
  "categories": {
    "profileClarity": 25, "contentQuality": 25, "trustScore": 20, "customerEngagement": 15, "businessReadiness": 15
  },
  "growthPotential": "Low" | "Moderate" | "High" | "Very High",
  "dataCoverage": 50-95
}`;

                const userQuery = `Analyze the ${platform} profile with URL: ${url}. Provide a digital business readiness report.`;

                try {
                    let responseText = "";
                    let success = false;
                    
                    if (apiKey) {
                        try {
                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: userQuery }] }],
                                    systemInstruction: { parts: [{ text: systemPrompt }] },
                                    generationConfig: { responseMimeType: "application/json" }
                                })
                            });
                            
                            if (response.ok) {
                                const data = await response.json();
                                responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                                if (responseText) success = true;
                            }
                        } catch (e) {}
                    }

                    let finalData = success ? JSON.parse(responseText) : generateSimulatedResults(url, platform);

                    setTimeout(() => {
                        setAnalysisResults(finalData);
                        setView('results');
                    }, 1500);

                } catch (error) {
                    setAnalysisResults(generateSimulatedResults(url, platform));
                    setView('results');
                }
            };

            const generateSimulatedResults = (url, platform) => {
                const hash = url.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const score = 68 + (hash % 24); 
                
                return {
                    businessName: "Your Instagram Business Profile",
                    profileIdentity: "This profile appears to belong to an active commercial enterprise operating on Instagram.",
                    score: score,
                    label: score >= 90 ? "Excellent" : score >= 80 ? "Very Good" : score >= 70 ? "Good" : "Fair",
                    summary: "Your profile has a solid foundation. Focusing on clear calls-to-action will immediately boost trust and conversions.",
                    strengths: [
                        "✓ Visual identity looks mostly consistent",
                        "✓ Product presentation is clear",
                        "✓ Profile is active and reachable"
                    ],
                    opportunities: [
                        "• Direct contact links are hard to find",
                        "• Bio description lacks a strong value proposition",
                        "• Customer engagement strategy needs optimization"
                    ],
                    recommendations: [
                        "Simplify your bio so customers understand your exact service in under 5 seconds.",
                        "Add a prominent WhatsApp or booking link directly in your profile.",
                        "Create pinned content highlighting customer reviews and FAQs."
                    ],
                    categories: {
                        profileClarity: 70 + (hash % 20),
                        contentQuality: 65 + ((hash + 2) % 25),
                        trustScore: 60 + ((hash + 4) % 30),
                        customerEngagement: 55 + ((hash + 6) % 35),
                        businessReadiness: 50 + ((hash + 8) % 40)
                    },
                    growthPotential: score > 80 ? "High" : "Moderate",
                    dataCoverage: 82 + (hash % 15)
                };
            };

            return (
                <div className="min-h-screen flex flex-col font-sans bg-gradient-to-b from-[#3b26be] to-[#170a70] text-white relative">
                    
                    {/* Tampilkan latar belakang 3D partikel interaktif hanya di halaman utama */}
                    {view === 'landing' && <ThreeBackground />}

                    <main className="flex-grow flex flex-col relative z-10">
                        {view === 'landing' && (
                            <LandingSection 
                                profileUrl={profileUrl} 
                                setProfileUrl={setProfileUrl} 
                                handleAnalyze={handleAnalyze} 
                                inputError={inputError}
                                setInputError={setInputError}
                            />
                        )}

                        {view === 'loading' && (
                            <LoadingSection currentStep={analyzingStep} steps={analysisSteps} />
                        )}

                        {view === 'results' && analysisResults && (
                            <ResultsSection 
                                results={analysisResults} 
                                url={profileUrl}
                                platform={detectPlatform(profileUrl)}
                                setView={setView}
                            />
                        )}
                    </main>
                </div>
            );
        }

        // ==========================================
        // 1. LANDING VIEW (Perfect Overlap Replica)
        // ==========================================
        function LandingSection({ profileUrl, setProfileUrl, handleAnalyze, inputError, setInputError }) {
            const mascotRef = useRef(null);

            // Efek 3D Parallax interaktif mengikuti pergerakan kursor mouse
            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!mascotRef.current) return;
                    const x = (window.innerWidth / 2 - e.pageX) / 45;
                    const y = (window.innerHeight / 2 - e.pageY) / 45;
                    mascotRef.current.style.transform = `perspective(1000px) rotateY(${-x}deg) rotateX(${y}deg) scale3d(1.18, 1.18, 1.18)`;
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div className="min-h-screen w-full flex flex-col relative font-sans overflow-hidden">
                    
                    {/* Header Navigasi Minimalis ke website utama (Pojok Kanan Atas) */}
                    <nav className="flex items-center justify-end px-6 sm:px-12 py-6 w-full max-w-[1600px] mx-auto text-white z-50 animate-fade-in-up">
                        <a href="https://voxlumedia.com" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 bg-vox-btn/60 backdrop-blur-md border border-white/10 rounded-full px-5 py-2.5 text-sm font-extrabold tracking-tight hover:opacity-90 hover:border-white/20 transition-all">
                            <div className="w-6 h-6 rounded-full bg-[#191046] flex items-center justify-center overflow-hidden">
                                <img src={LOGO_URL} className="w-full h-full object-contain" alt="Logo" onError={(e) => { e.target.style.display = 'none'; }} />
                            </div>
                            VOXLUMEDIA.COM &rarr;
                        </a>
                    </nav>

                    {/* Area Hero Utama yang Dioptimalkan untuk Menonjolkan Maskot */}
                    <div className="flex-grow flex flex-col lg:flex-row items-center justify-center max-w-[1350px] mx-auto px-6 py-2 gap-8 lg:gap-4 relative w-full z-10">
                        
                        {/* KIRI: Maskot ryanvox_large.png Berukuran Sangat Besar & Dominan (z-30) */}
                        <div className="w-full lg:w-5/12 flex justify-center relative perspective-1000 z-30 lg:-mr-6">
                            <div 
                                className="relative w-full max-w-[380px] sm:max-w-[540px] lg:max-w-[620px] animate-float transition-transform duration-300 ease-out" 
                                ref={mascotRef}
                                style={{ transform: 'scale3d(1.18, 1.18, 1.18)' }}
                            >
                                {/* Pijaran cahaya biru futuristik di belakang robot */}
                                <div className="absolute inset-0 bg-blue-400/25 blur-[120px] rounded-full"></div>
                                <img 
                                    src={MASCOT_URL} 
                                    alt="Vox Large Mascot" 
                                    className="w-full h-auto drop-shadow-[0_30px_45px_rgba(0,0,0,0.5)] pointer-events-none"
                                />
                            </div>
                        </div>

                        {/* KANAN: Informasi Headline SVG & Input Pencarian (z-10) */}
                        <div className="w-full lg:w-7/12 text-white space-y-6 text-center lg:text-left z-10 mt-4 lg:mt-0 animate-fade-in-up" style={{animationDelay: '0.15s'}}>
                            
                            <div className="space-y-4">
                                {/* Headline Digantikan dengan SVG Headline Khusus sesuai Mockup */}
                                <div className="max-w-md sm:max-w-lg lg:max-w-[560px] mx-auto lg:mx-0">
                                    <img 
                                        src={HEADLINE_SVG_URL} 
                                        alt="Vox Social Media Score" 
                                        className="w-full h-auto object-contain drop-shadow-[0_8px_16px_rgba(0,0,0,0.4)] pointer-events-none"
                                    />
                                </div>
                                <p className="text-base sm:text-[18px] font-medium text-white/95 max-w-lg mx-auto lg:mx-0 leading-snug pt-2">
                                    Get a clear picture of your Instagram presence and discover growth opportunities.
                                </p>
                            </div>

                            {/* Form Input Pencarian Tautan Instagram */}
                            <form onSubmit={handleAnalyze} className="relative max-w-xl mx-auto lg:mx-0 pt-2 space-y-3">
                                <div className="flex flex-col sm:flex-row gap-2 bg-white p-1.5 rounded-[2rem] sm:rounded-full shadow-2xl hover:shadow-[0_0_35px_rgba(255,255,255,0.25)] transition-shadow duration-300">
                                    <div className="relative flex-grow flex items-center px-4">
                                        <i className="fa-solid fa-link text-gray-400 text-lg"></i>
                                        <input 
                                            type="url" 
                                            required
                                            maxLength={100}
                                            value={profileUrl}
                                            onChange={(e) => {
                                                setInputError('');
                                                setProfileUrl(e.target.value);
                                            }}
                                            placeholder="instagram.com/your_business_profile"
                                            className="w-full bg-transparent text-gray-800 font-semibold pl-4 pr-2 py-4 focus:outline-none text-base placeholder-gray-400"
                                        />
                                    </div>
                                    <button 
                                        type="submit" 
                                        className="bg-vox-btn hover:bg-black text-white font-bold px-8 py-4 rounded-full transition-all duration-300 whitespace-nowrap flex items-center justify-center gap-2 group shadow-inner"
                                    >
                                        Check My Score <i className="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                                    </button>
                                </div>

                                {/* Indikator Info dan Sisa Karakter sesuai Layout Mockup */}
                                <div className="flex justify-between items-center text-xs text-white/70 px-4 font-semibold">
                                    <span>Instagram URLs Only</span>
                                    <span>{profileUrl.length}/100 characters</span>
                                </div>

                                {/* Pemberitahuan Kesalahan Validasi Input */}
                                {inputError && (
                                    <div className="bg-rose-500/20 border border-rose-500/40 text-rose-200 px-5 py-3 rounded-2xl text-sm font-semibold flex items-center gap-3 animate-fade-in-up">
                                        <i className="fa-solid fa-circle-exclamation text-rose-400 text-base"></i>
                                        <span>{inputError}</span>
                                    </div>
                                )}
                            </form>

                            {/* Daftar Dukungan Khusus Instagram */}
                            <div className="space-y-4 pt-3">
                                <div className="flex flex-col sm:flex-row items-center gap-3 text-sm font-bold text-white/95 justify-center lg:justify-start">
                                    <span>Exclusively optimized for:</span>
                                    <div className="flex gap-4 text-xl">
                                        <div className="flex items-center gap-2 px-3 py-1 bg-white/10 rounded-full border border-white/15">
                                            <i className="fa-brands fa-instagram text-pink-400"></i>
                                            <span className="text-xs uppercase tracking-wider font-extrabold">Instagram Audit</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-wrap items-center justify-center lg:justify-start gap-x-6 gap-y-2 text-xs font-bold text-white/70">
                                    <span className="flex items-center gap-1.5"><i className="fa-solid fa-lock text-[10px]"></i> No login required</span>
                                    <span className="flex items-center gap-1.5"><i className="fa-solid fa-shield text-[10px]"></i> 100% safe & private</span>
                                    <span className="flex items-center gap-1.5"><i className="fa-regular fa-eye text-[10px]"></i> Public info only</span>
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* Bagian Panel Informasi / Fitur di Sisi Bawah Halaman */}
                    <div className="bg-white text-gray-900 rounded-t-[2.5rem] sm:rounded-t-[3.5rem] w-full mt-10 lg:mt-auto relative z-30 pt-14 pb-8 px-6 shadow-[0_-15px_40px_rgba(0,0,0,0.15)] animate-fade-in-up animate-delay-300">
                        <div className="max-w-[1300px] mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6 lg:gap-10">
                            {[
                                { icon: 'fa-solid fa-link', title: 'Enter Link', desc: 'Paste your public Instagram profile URL.' },
                                { icon: 'fa-solid fa-magnifying-glass', title: 'We Analyze', desc: 'Our system reviews key elements of your profile.' },
                                { icon: 'fa-solid fa-chart-simple', title: 'Get Your Score', desc: 'See your score across 5 business-focused areas.' },
                                { icon: 'fa-regular fa-lightbulb', title: 'Get Recommendations', desc: 'Receive simple and actionable improvement tips.' },
                                { icon: 'fa-solid fa-rocket', title: 'Grow Your Business', desc: 'Improve your presence and attract more customers.' }
                            ].map((step, i) => (
                                <div key={i} className="flex flex-col items-center text-center gap-3 group cursor-default">
                                    <div className="w-14 h-14 rounded-full bg-vox-bg text-white flex items-center justify-center text-xl shadow-md group-hover:scale-105 group-hover:bg-vox-btn transition-all duration-300">
                                        <i className={step.icon}></i>
                                    </div>
                                    <div>
                                        <h4 className="font-extrabold text-[#111827] text-base mb-1">{step.title}</h4>
                                        <p className="text-[13px] text-gray-500 font-medium leading-relaxed max-w-[200px] mx-auto">{step.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="text-center mt-10 pt-6 border-t border-gray-100">
                            <p className="text-xs font-extrabold text-[#3b26be]">
                                Built for business owners. <span className="border-b-2 border-[#3b26be] pb-0.5">Focused on growth.</span>
                            </p>
                        </div>
                    </div>

                </div>
            );
        }

        // ==========================================
        // 2. LOADING SCREEN
        // ==========================================
        function LoadingSection({ currentStep, steps }) {
            const progressPercentage = Math.round(((currentStep + 1) / steps.length) * 100);

            return (
                <div className="min-h-screen bg-vox-bg flex flex-col items-center justify-center p-6 relative z-10">
                    <div className="max-w-md w-full bg-white/10 backdrop-blur-md p-10 rounded-3xl border border-white/20 shadow-2xl text-center space-y-8 animate-fade-in-up">
                        
                        <div className="relative w-28 h-28 mx-auto">
                            <div className="absolute inset-0 rounded-full border-4 border-white/20"></div>
                            <div className="absolute inset-0 rounded-full border-4 border-t-white border-r-white animate-spin"></div>
                            <div className="absolute inset-2 flex items-center justify-center">
                                <i className="fa-solid fa-robot text-white text-3xl animate-pulse"></i>
                            </div>
                        </div>

                        <div>
                            <h2 className="text-2xl font-black text-white mb-2">Analyzing Profile</h2>
                            <p className="text-white/70 font-medium text-sm">
                                Extracting public insights via Vox AI...
                            </p>
                        </div>

                        <div className="space-y-3">
                            <div className="flex justify-between text-xs font-bold text-white/70">
                                <span>PROGRESS</span>
                                <span className="text-white">{progressPercentage}%</span>
                            </div>
                            <div className="w-full bg-black/30 h-2 rounded-full overflow-hidden">
                                <div 
                                    className="bg-white h-full rounded-full transition-all duration-500 ease-out relative overflow-hidden" 
                                    style={{ width: `${progressPercentage}%` }}
                                ></div>
                            </div>
                            
                            <div className="pt-3 text-xs font-bold text-white/90 h-8 flex items-center justify-center">
                                <span>{steps[currentStep]}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. RESULTS DASHBOARD (Sophisticated Summary)
        // ==========================================
        function ResultsSection({ results, url, platform, setView }) {
            const [leadSubmitted, setLeadSubmitted] = useState(false);
            const [leadData, setLeadData] = useState({ name: '', email: '', phone: '' });

            const handleLeadSubmit = (e) => {
                e.preventDefault();
                setLeadSubmitted(true);
            };

            const getScoreColor = (score) => {
                if (score >= 90) return 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20';
                if (score >= 80) return 'text-blue-400 bg-blue-400/10 border-blue-400/20';
                if (score >= 70) return 'text-amber-400 bg-amber-400/10 border-amber-400/20';
                return 'text-rose-400 bg-rose-400/10 border-rose-400/20';
            };

            return (
                <div className="min-h-screen bg-[#FDFCF8] text-gray-900 w-full relative z-20 pb-20">
                    
                    {/* Header bar matching landing style but light mode */}
                    <nav className="bg-[#170a70] text-white px-6 sm:px-12 py-5 sticky top-0 z-50 shadow-md">
                        <div className="max-w-[1400px] mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3 font-extrabold text-xl cursor-pointer" onClick={() => setView('landing')}>
                                <img src={LOGO_URL} className="w-8 h-8 rounded-full bg-white p-0.5" alt="Logo" onError={(e) => { e.target.style.display = 'none'; }} />
                                VOXLUMEDIA
                            </div>
                            <button onClick={() => setView('landing')} className="text-sm border border-white/30 hover:bg-white hover:text-vox-bg font-bold py-2 px-5 rounded-full transition duration-300">
                                New Scan
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-5xl mx-auto py-12 px-6 space-y-10 animate-fade-in-up">
                        
                        {/* PERFORMANCE SUMMARY SECTION */}
                        <div className="bg-white rounded-[2rem] border border-gray-200 p-8 sm:p-12 shadow-xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-vox-bg/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

                            <div className="text-center mb-10 relative z-10">
                                <span className="text-xs font-black tracking-widest text-vox-accent uppercase mb-2 block">Performance Summary</span>
                                <h2 className="text-3xl sm:text-4xl font-black text-gray-900">Your Business Health Report</h2>
                                <p className="text-gray-500 font-medium mt-2 flex items-center justify-center gap-2">
                                    <i className="fa-solid fa-chart-pie"></i> {platform} Analysis
                                </p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-12 gap-10 items-center relative z-10">
                                {/* Score Circle */}
                                <div className="md:col-span-5 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-gray-100 pb-8 md:pb-0">
                                    <div className="relative w-48 h-48 flex items-center justify-center mb-6">
                                        <svg className="absolute w-full h-full transform -rotate-90">
                                            <circle cx="96" cy="96" r="88" stroke="#f1f5f9" strokeWidth="16" fill="transparent" />
                                            <circle 
                                                cx="96" cy="96" r="88" 
                                                stroke={results.score >= 90 ? "#34d399" : results.score >= 80 ? "#60a5fa" : results.score >= 70 ? "#fbbf24" : "#fb7185"} 
                                                strokeWidth="16" fill="transparent" strokeDasharray={553}
                                                strokeDashoffset={553 - (553 * results.score) / 100}
                                                strokeLinecap="round" className="transition-all duration-1500 ease-out"
                                            />
                                        </svg>
                                        <div className="text-center relative z-10 flex flex-col items-center mt-2">
                                            <span className="text-6xl font-black text-gray-900 tracking-tighter">{results.score}</span>
                                            <span className="text-sm font-bold text-gray-400 uppercase mt-1">Score</span>
                                        </div>
                                    </div>
                                    <span className={`px-6 py-2 rounded-full text-sm font-black border uppercase tracking-wider ${getScoreColor(results.score)}`}>
                                        {results.label}
                                    </span>
                                </div>

                                {/* Narrative Summary with exact One Sentence Profile Identity Display */}
                                <div className="md:col-span-7 space-y-6">
                                    <div className="bg-gray-50 p-6 rounded-2xl border border-gray-100 shadow-inner">
                                        <div className="mb-4 pb-4 border-b border-gray-200">
                                            <span className="text-[10px] font-black tracking-widest text-gray-400 uppercase mb-1 block">Profile Identity</span>
                                            <p className="text-gray-900 font-bold text-lg leading-snug">
                                                {results.profileIdentity}
                                            </p>
                                        </div>
                                        <p className="text-gray-600 font-medium text-base leading-relaxed italic">
                                            "{results.summary}"
                                        </p>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white border border-gray-100 p-4 rounded-xl shadow-sm flex items-start gap-3">
                                            <i className="fa-solid fa-arrow-trend-up text-vox-accent mt-1"></i>
                                            <div>
                                                <p className="text-[10px] text-gray-400 font-bold uppercase">Growth Potential</p>
                                                <p className="text-base font-black text-gray-900">{results.growthPotential}</p>
                                            </div>
                                        </div>
                                        <div className="bg-white border border-gray-100 p-4 rounded-xl shadow-sm flex items-start gap-3">
                                            <i className="fa-solid fa-check-double text-emerald-500 mt-1"></i>
                                            <div>
                                                <p className="text-[10px] text-gray-400 font-bold uppercase">Profile Readiness</p>
                                                <p className="text-base font-black text-gray-900">{results.categories.businessReadiness}/100</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Breakdown Categories */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-white border border-gray-200 rounded-3xl p-8 shadow-sm hover:shadow-md transition-shadow">
                                <h3 className="text-xl font-black text-gray-900 mb-6 flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center"><i className="fa-solid fa-check text-sm"></i></div>
                                    Key Strengths
                                </h3>
                                <ul className="space-y-4">
                                    {results.strengths.map((item, i) => (
                                        <li key={i} className="flex items-start gap-3 text-gray-600 font-medium">
                                            <i className="fa-solid fa-circle-check text-emerald-500 mt-1"></i>
                                            {item.replace('✓', '').trim()}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            
                            <div className="bg-white border border-gray-200 rounded-3xl p-8 shadow-sm hover:shadow-md transition-shadow">
                                <h3 className="text-xl font-black text-gray-900 mb-6 flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-amber-100 text-amber-500 flex items-center justify-center"><i className="fa-solid fa-lightbulb text-sm"></i></div>
                                    Opportunities
                                </h3>
                                <ul className="space-y-4">
                                    {results.opportunities.map((item, i) => (
                                        <li key={i} className="flex items-start gap-3 text-gray-600 font-medium">
                                            <i className="fa-solid fa-arrow-right text-amber-500 mt-1"></i>
                                            {item.replace('•', '').trim()}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        {/* Detailed Metrics */}
                        <div className="bg-gradient-to-b from-[#3b26be] to-[#170a70] text-white rounded-[2rem] p-8 sm:p-10 shadow-2xl relative overflow-hidden">
                            <div className="absolute -right-20 -bottom-20 w-64 h-64 bg-white/5 rounded-full blur-3xl pointer-events-none"></div>
                            
                            <h3 className="text-2xl font-black mb-8 relative z-10">Metric Breakdown</h3>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-8 relative z-10">
                                {[
                                    { label: 'Profile Clarity', score: results.categories.profileClarity, icon: 'fa-id-badge' },
                                    { label: 'Content Quality', score: results.categories.contentQuality, icon: 'fa-image' },
                                    { label: 'Trust Signals', score: results.categories.trustScore, icon: 'fa-shield-halved' }
                                ].map((cat, i) => (
                                    <div key={i} className="bg-white/10 backdrop-blur-sm border border-white/10 p-5 rounded-2xl">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-sm font-bold text-white/70 flex items-center gap-2"><i className={`fa-solid ${cat.icon}`}></i> {cat.label}</span>
                                            <span className="text-xl font-black">{cat.score}</span>
                                        </div>
                                        <div className="w-full bg-black/30 h-1.5 rounded-full">
                                            <div className="bg-white h-full rounded-full" style={{ width: `${cat.score}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Lead Capture */}
                        <div className="bg-white border border-gray-200 rounded-[2rem] p-8 sm:p-12 shadow-xl text-center">
                            {!leadSubmitted ? (
                                <div className="max-w-xl mx-auto space-y-6">
                                    <div className="w-16 h-16 bg-[#3b26be]/10 text-[#3b26be] rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                                        <i className="fa-solid fa-file-pdf"></i>
                                    </div>
                                    <h3 className="text-3xl font-black text-gray-900">Get Your Complete PDF Report</h3>
                                    <p className="text-gray-500 font-medium">Enter your details to receive a full breakdown and an invitation to a free 30-minute growth consultation with our experts.</p>
                                    
                                    <form onSubmit={handleLeadSubmit} className="space-y-4 pt-4 text-left">
                                        <input type="text" required placeholder="Your Name" className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#3b26be] bg-gray-50" />
                                        <input type="email" required placeholder="Business Email" className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#3b26be] bg-gray-50" />
                                        <button type="submit" className="w-full bg-vox-btn hover:bg-black text-white font-bold py-4 rounded-xl transition duration-300 shadow-md">
                                            Send Me The Report &rarr;
                                        </button>
                                    </form>
                                </div>
                            ) : (
                                <div className="py-10 space-y-4">
                                    <div className="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto text-4xl">
                                        <i className="fa-solid fa-check"></i>
                                    </div>
                                    <h4 className="text-3xl font-black text-gray-900">Success!</h4>
                                    <p className="text-gray-500 font-medium max-w-md mx-auto">Your comprehensive report is being generated. Our team will reach out to you shortly to schedule your growth strategy session.</p>
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
