<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox Social Media Score - Digital Business Health Report</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#0f172a', // Slate 900 for high-contrast modern look
                            light: '#334155',
                            dark: '#020617',
                            accent: '#4324c4', // Keep original vox purple for subtle accents
                        },
                        surface: {
                            DEFAULT: '#FDFCF8', // Warm off-white/cream like the reference image
                            card: '#FFFFFF',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'border': '0 0 0 1px rgba(0,0,0,0.05), 0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Lucide Icons (Fallback via FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFCF8;
            color: #0f172a;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #FDFCF8;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="antialiased">

    <!-- React Root -->
    <div id="root"></div>

    <!-- React and Babel CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.10/babel.min.js" crossorigin></script>

    <!-- Main React Application Code -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vox-social-media-score';
        const apiKey = ""; 

        // Asset URLs
        const MASCOT_URL = "https://raw.githubusercontent.com/lengkongandreuw/voxsocial/main/assets/ryanvox.png";
        const LOGO_URL = "https://raw.githubusercontent.com/lengkongandreuw/voxsocial/main/assets/vsllogo.png";

        function App() {
            const [view, setView] = useState('landing'); // 'landing' | 'loading' | 'results'
            const [profileUrl, setProfileUrl] = useState('');
            const [analyzingStep, setAnalyzingStep] = useState(0);
            const [leadSubmitted, setLeadSubmitted] = useState(false);
            const [leadData, setLeadData] = useState({ name: '', email: '', company: '', phone: '' });
            const [analysisResults, setAnalysisResults] = useState(null);

            const analysisSteps = [
                "Connecting to public profile...",
                "Analyzing Profile Clarity & Description...",
                "Checking Visual Quality & Content Consistency...",
                "Evaluating Trust Signals & Website Presence...",
                "Measuring Customer Contact Readiness...",
                "Compiling Final Score and Growth Recommendations..."
            ];

            useEffect(() => {
                let interval;
                if (view === 'loading') {
                    setAnalyzingStep(0);
                    interval = setInterval(() => {
                        setAnalyzingStep((prev) => {
                            if (prev < analysisSteps.length - 1) {
                                return prev + 1;
                            } else {
                                clearInterval(interval);
                                return prev;
                            }
                        });
                    }, 1200);
                }
                return () => clearInterval(interval);
            }, [view]);

            const detectPlatform = (url) => {
                const lower = url.toLowerCase();
                if (lower.includes('instagram.com')) return 'Instagram';
                if (lower.includes('facebook.com')) return 'Facebook Page';
                if (lower.includes('tiktok.com')) return 'TikTok';
                if (lower.includes('linkedin.com')) return 'LinkedIn Company Page';
                if (lower.includes('youtube.com') || lower.includes('youtu.be')) return 'YouTube Channel';
                return 'Social Media Profile';
            };

            const handleAnalyze = async (e) => {
                e.preventDefault();
                if (!profileUrl.trim()) return;

                setView('loading');
                const platform = detectPlatform(profileUrl);
                
                const systemPrompt = `You are a senior digital business auditor evaluating social media profiles for non-technical conventional business owners (aged 40-65).
Use SIMPLE, friendly, professional, and easy-to-understand ENGLISH.
DO NOT use technical marketing jargon like: CTR, CPM, Funnel Optimization, Audience Retention, Organic Velocity, Conversion Architecture, Marketing Attribution.
STRONGLY PREFER simple business terms like: Customer Trust, Business Visibility, First Impression, Contact Readiness, Growth Opportunity, Customer Engagement, Business Presence.

Provide a real, realistic, and honest critical analysis based on the provided profile URL.
Output format must be pure JSON with the following structure without extra markdown:
{
  "businessName": "Detected Business Name or Handle from URL",
  "score": 40-95 (Random integer based on platform guess),
  "label": "Excellent" (90-100) or "Very Good" (80-89) or "Good" (70-79) or "Fair" (60-69) or "Needs Attention" (below 60),
  "summary": "One friendly summary line highlighting potential and main improvement areas (max 80 chars).",
  "strengths": ["Max 3 main strengths in English starting with a checkmark (✓). Example: '✓ Business identity is very clear'"],
  "opportunities": ["Max 3 improvement opportunities starting with a bullet (•). Example: '• Add a direct contact button'"],
  "recommendations": [
     "3 actionable recommendations. Each recommendation MUST be ONE sentence with a maximum of 20 words. Example: 'State your main service in the first line of your description so it is instantly visible.'"
  ],
  "categories": {
    "profileClarity": 25% weight (score 1-100),
    "contentQuality": 25% weight (score 1-100),
    "trustScore": 20% weight (score 1-100),
    "customerEngagement": 15% weight (score 1-100),
    "businessReadiness": 15% weight (score 1-100)
  },
  "growthPotential": "Low" or "Moderate" or "High" or "Very High",
  "dataCoverage": 50-95 (Realistic data coverage percentage)
}`;

                const userQuery = `Analyze the ${platform} profile with URL: ${profileUrl}. Provide a digital business readiness report.`;

                try {
                    let responseText = "";
                    let success = false;
                    
                    if (apiKey || typeof __initial_auth_token !== 'undefined') {
                        let delay = 1000;
                        for (let attempt = 1; attempt <= 3; attempt++) {
                            try {
                                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        contents: [{ parts: [{ text: userQuery }] }],
                                        systemInstruction: { parts: [{ text: systemPrompt }] },
                                        generationConfig: { responseMimeType: "application/json" }
                                    })
                                });
                                
                                if (response.ok) {
                                    const data = await response.json();
                                    responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                                    if (responseText) {
                                        success = true;
                                        break;
                                    }
                                }
                            } catch (e) {}
                            await new Promise(resolve => setTimeout(resolve, delay));
                            delay *= 2;
                        }
                    }

                    let finalData;
                    if (success && responseText) {
                        finalData = JSON.parse(responseText);
                    } else {
                        finalData = generateSimulatedResults(profileUrl, platform);
                    }

                    setTimeout(() => {
                        setAnalysisResults(finalData);
                        setView('results');
                    }, 1500);

                } catch (error) {
                    const fallback = generateSimulatedResults(profileUrl, platform);
                    setAnalysisResults(fallback);
                    setView('results');
                }
            };

            const generateSimulatedResults = (url, platform) => {
                let handle = "Your Business";
                try {
                    const cleanUrl = url.replace(/^(https?:\/\/)?(www\.)?/, '');
                    const parts = cleanUrl.split('/');
                    if (parts.length > 1 && parts[1].trim() !== '') {
                        handle = "@" + parts[1].split('?')[0];
                    }
                } catch(e) {}

                const hash = url.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const score = 65 + (hash % 25); 
                
                let label = "Good";
                let summary = "Your profile shows a fairly strong foundation with some key opportunities for improvement.";
                if (score >= 90) {
                    label = "Excellent";
                    summary = "Your digital business presence is outstanding and highly prepared to attract new customers.";
                } else if (score >= 80) {
                    label = "Very Good";
                    summary = "Your profile is well-managed and has high potential to grow your customer base.";
                } else if (score >= 70) {
                    label = "Good";
                    summary = "Your business foundation is solid, but there are communication gaps to optimize.";
                } else {
                    label = "Fair";
                    summary = "Crucial improvements to your profile will immediately boost potential customer trust.";
                }

                const allRecs = [
                    `Simplify your profile description so customers know your main solution in under 5 seconds.`,
                    `Add a direct contact link (like WhatsApp) to make it easier for buyers to order.`,
                    `Use a contrasting background color for your logo so your business name is easily recognizable.`,
                    `Clearly state your operating hours or physical location in your basic profile information.`,
                    `Create weekly content specifically answering the most frequently asked questions by your potential customers.`
                ];

                const selectedRecs = [
                    allRecs[hash % allRecs.length],
                    allRecs[(hash + 1) % allRecs.length],
                    allRecs[(hash + 2) % allRecs.length]
                ];

                return {
                    businessName: handle,
                    score: score,
                    label: label,
                    summary: summary,
                    strengths: [
                        "✓ Visual identity of the business name looks consistent",
                        "✓ Use of an easily recognizable profile picture",
                        "✓ Presentation of main products captures attention well"
                    ],
                    opportunities: [
                        "• Call-to-Action needs to be much clearer",
                        "• Contact information and order links are not prominent",
                        "• Frequency of customer interaction can be improved"
                    ],
                    recommendations: selectedRecs,
                    categories: {
                        profileClarity: 70 + (hash % 20),
                        contentQuality: 65 + ((hash + 2) % 25),
                        trustScore: 60 + ((hash + 4) % 30),
                        customerEngagement: 55 + ((hash + 6) % 35),
                        businessReadiness: 50 + ((hash + 8) % 40)
                    },
                    growthPotential: score > 85 ? "Very High" : score > 75 ? "High" : "Moderate",
                    dataCoverage: 75 + (hash % 18)
                };
            };

            const handleLeadSubmit = (e) => {
                e.preventDefault();
                setLeadSubmitted(true);
            };

            const resetAnalyzer = () => {
                setProfileUrl('');
                setLeadSubmitted(false);
                setLeadData({ name: '', email: '', company: '', phone: '' });
                setView('landing');
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    
                    {/* Modern Clean Header */}
                    <header className="border-b border-gray-200 bg-white/80 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={resetAnalyzer}>
                                <img src={LOGO_URL} alt="VSL Logo" className="h-10 w-auto object-contain rounded-full border border-gray-100" onError={(e) => { e.target.style.display = 'none'; }} />
                                <span className="font-extrabold text-2xl tracking-tighter text-brand">VOX<span className="text-gray-400 font-medium">SOCIAL</span></span>
                            </div>
                            <div className="hidden sm:flex items-center gap-8 text-sm font-semibold text-gray-500">
                                <span className="hover:text-brand cursor-pointer transition-colors">Features</span>
                                <span className="hover:text-brand cursor-pointer transition-colors">Methodology</span>
                                <span className="hover:text-brand cursor-pointer transition-colors">Case Studies</span>
                            </div>
                            <button onClick={resetAnalyzer} className="text-sm bg-brand hover:bg-brand-light text-white font-bold py-2.5 px-6 rounded-full transition duration-300 shadow-sm">
                                New Scan
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow">
                        {view === 'landing' && (
                            <LandingSection 
                                profileUrl={profileUrl} 
                                setProfileUrl={setProfileUrl} 
                                handleAnalyze={handleAnalyze} 
                            />
                        )}

                        {view === 'loading' && (
                            <LoadingSection 
                                currentStep={analyzingStep} 
                                steps={analysisSteps} 
                            />
                        )}

                        {view === 'results' && analysisResults && (
                            <ResultsSection 
                                results={analysisResults} 
                                url={profileUrl}
                                platform={detectPlatform(profileUrl)}
                                leadSubmitted={leadSubmitted}
                                leadData={leadData}
                                setLeadData={setLeadData}
                                handleLeadSubmit={handleLeadSubmit}
                                resetAnalyzer={resetAnalyzer}
                            />
                        )}
                    </main>

                    <footer className="bg-white border-t border-gray-200 text-gray-500 py-12 px-6 text-center text-sm">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-3">
                                <img src={LOGO_URL} className="h-8 w-auto grayscale opacity-60" onError={(e) => { e.target.style.display = 'none'; }} />
                                <p className="font-bold text-gray-900">Vox Social Score &copy; {new Date().getFullYear()}</p>
                            </div>
                            <p className="max-w-md text-xs text-gray-400 font-medium">
                                This self-evaluation tool is designed purely to help traditional business owners grow. We maintain the confidentiality of your public data.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        // ==========================================
        // 1. LANDING / HERO VIEW (Modern & Clean)
        // ==========================================
        function LandingSection({ profileUrl, setProfileUrl, handleAnalyze }) {
            const [selectedPlatform, setSelectedPlatform] = useState('Instagram');
            
            const platforms = [
                { name: 'Instagram', icon: 'fa-brands fa-instagram', placeholder: 'instagram.com/your_business' },
                { name: 'Facebook', icon: 'fa-brands fa-facebook', placeholder: 'facebook.com/yourbusinesspage' },
                { name: 'TikTok', icon: 'fa-brands fa-tiktok', placeholder: 'tiktok.com/@your_business' },
                { name: 'LinkedIn', icon: 'fa-brands fa-linkedin', placeholder: 'linkedin.com/company/your-company' },
            ];

            const currentPlaceholder = platforms.find(p => p.name === selectedPlatform)?.placeholder || 'Enter your business profile URL';

            return (
                <div className="relative overflow-hidden min-h-[85vh] flex items-center justify-center py-16 px-4 sm:px-6">
                    {/* Minimalist abstract shapes */}
                    <div className="absolute top-20 -left-20 w-72 h-72 rounded-full border border-gray-200/60 pointer-events-none"></div>
                    <div className="absolute -bottom-20 right-10 w-[500px] h-[500px] rounded-full border border-gray-200/60 pointer-events-none"></div>

                    <div className="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 items-center relative z-10">
                        
                        {/* LEFT: Content and Input */}
                        <div className="space-y-10 order-2 lg:order-1">
                            <div className="space-y-6">
                                <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-white border border-gray-200 rounded-full text-xs font-bold tracking-wider text-gray-600 shadow-sm">
                                    <span className="relative flex h-2.5 w-2.5">
                                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                      <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                                    </span>
                                    INSTANT BUSINESS HEALTH CHECK
                                </div>
                                <h1 className="text-5xl sm:text-6xl lg:text-7xl font-black leading-[1.1] tracking-tighter text-brand">
                                    Social Media <br />
                                    <span className="text-gray-400">Health Check.</span>
                                </h1>
                                <p className="text-lg text-gray-600 max-w-lg font-medium leading-relaxed">
                                    Discover how easily potential customers trust and buy from your social media profile. <span className="font-bold text-brand">100% free, no login required.</span>
                                </p>
                            </div>

                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    {platforms.map((p) => (
                                        <button
                                            key={p.name}
                                            onClick={(e) => {
                                                e.preventDefault();
                                                setSelectedPlatform(p.name);
                                            }}
                                            className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 border ${
                                                selectedPlatform === p.name 
                                                ? 'bg-brand text-white border-brand shadow-md' 
                                                : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300 hover:bg-gray-50'
                                            }`}
                                        >
                                            <i className={p.icon}></i>
                                            <span className="hidden sm:inline">{p.name}</span>
                                        </button>
                                    ))}
                                </div>

                                <form onSubmit={handleAnalyze} className="relative">
                                    <div className="flex flex-col sm:flex-row gap-3 bg-white p-2 rounded-2xl border border-gray-200 shadow-soft">
                                        <div className="relative flex-grow flex items-center">
                                            <i className="fa-solid fa-link absolute left-4 text-gray-400"></i>
                                            <input 
                                                type="url" 
                                                required
                                                placeholder={currentPlaceholder}
                                                value={profileUrl}
                                                onChange={(e) => setProfileUrl(e.target.value)}
                                                className="w-full bg-transparent text-brand font-medium pl-12 pr-4 py-4 rounded-xl focus:outline-none text-base placeholder-gray-400"
                                            />
                                        </div>
                                        <button 
                                            type="submit" 
                                            className="bg-brand hover:bg-brand-light text-white font-bold px-8 py-4 rounded-xl transition duration-200 flex items-center justify-center gap-3 shrink-0 shadow-sm"
                                        >
                                            Analyze Profile
                                            <i className="fa-solid fa-arrow-right"></i>
                                        </button>
                                    </div>
                                    <p className="text-xs text-gray-400 font-medium mt-4 flex items-center gap-2">
                                        <i className="fa-solid fa-lock"></i>
                                        We only read public data. We never ask for passwords or API keys.
                                    </p>
                                </form>
                            </div>
                        </div>

                        {/* RIGHT: Visual / Mascot */}
                        <div className="flex justify-center items-center order-1 lg:order-2">
                            <div className="relative w-full max-w-md">
                                <div className="absolute inset-0 bg-gray-200/50 rounded-[3rem] transform rotate-3 scale-105"></div>
                                <img 
                                    src={MASCOT_URL} 
                                    alt="Vox Mascot" 
                                    className="relative z-10 w-full h-auto object-contain drop-shadow-2xl hover:-translate-y-2 transition-transform duration-500"
                                    onError={(e) => {
                                        e.target.src = "https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&q=80&w=500";
                                        e.target.className = "rounded-[3rem] shadow-2xl grayscale";
                                    }}
                                />
                                {/* Floating Badge */}
                                <div className="absolute -bottom-6 -left-6 bg-white p-4 rounded-2xl border border-gray-100 shadow-xl flex items-center gap-4 z-20 animate-bounce" style={{animationDuration: '3s'}}>
                                    <div className="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                                        <i className="fa-solid fa-chart-pie text-xl"></i>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-400 font-bold uppercase">Average Score</p>
                                        <p className="text-xl font-black text-brand">82/100</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 2. LOADING SCREEN
        // ==========================================
        function LoadingSection({ currentStep, steps }) {
            const progressPercentage = Math.round(((currentStep + 1) / steps.length) * 100);

            return (
                <div className="min-h-[70vh] flex flex-col items-center justify-center py-12 px-6">
                    <div className="max-w-md w-full bg-white p-10 rounded-3xl border border-gray-200 shadow-soft text-center space-y-8">
                        
                        <div className="relative w-24 h-24 mx-auto">
                            <div className="absolute inset-0 rounded-full border-4 border-gray-100"></div>
                            <div className="absolute inset-0 rounded-full border-4 border-t-brand border-r-brand animate-spin"></div>
                            <div className="absolute inset-2 flex items-center justify-center">
                                <i className="fa-solid fa-magnifying-glass-chart text-brand text-2xl"></i>
                            </div>
                        </div>

                        <div>
                            <h2 className="text-2xl font-black text-brand mb-2">Analyzing Profile</h2>
                            <p className="text-gray-500 font-medium text-sm">
                                Please wait while our system maps your digital business presence...
                            </p>
                        </div>

                        <div className="space-y-3">
                            <div className="flex justify-between text-xs font-bold text-gray-400">
                                <span>AUDIT PROGRESS</span>
                                <span className="text-brand">{progressPercentage}%</span>
                            </div>
                            <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                <div 
                                    className="bg-brand h-full rounded-full transition-all duration-500 ease-out" 
                                    style={{ width: `${progressPercentage}%` }}
                                ></div>
                            </div>
                            
                            <div className="pt-2 text-xs font-bold text-brand h-8 flex items-center justify-center">
                                <span className="animate-pulse">{steps[currentStep]}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. RESULTS DASHBOARD (Modern Clean Layout)
        // ==========================================
        function ResultsSection({ results, url, platform, leadSubmitted, leadData, setLeadData, handleLeadSubmit, resetAnalyzer }) {
            
            const getScoreColor = (score) => {
                if (score >= 90) return 'text-emerald-600 bg-emerald-50 border-emerald-200';
                if (score >= 80) return 'text-indigo-600 bg-indigo-50 border-indigo-200';
                if (score >= 70) return 'text-amber-500 bg-amber-50 border-amber-200';
                return 'text-rose-500 bg-rose-50 border-rose-200';
            };

            const getProgressColor = (score) => {
                if (score >= 90) return 'bg-emerald-500';
                if (score >= 80) return 'bg-indigo-500';
                if (score >= 70) return 'bg-amber-500';
                return 'bg-rose-500';
            };

            return (
                <div className="max-w-6xl mx-auto py-12 px-4 sm:px-6 space-y-8">
                    
                    {/* Header / Summary Card */}
                    <div className="bg-white rounded-[2rem] border border-gray-200 p-8 sm:p-12 shadow-soft grid grid-cols-1 md:grid-cols-12 gap-10 items-center">
                        
                        {/* Score Circle */}
                        <div className="md:col-span-4 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-gray-100 pb-8 md:pb-0">
                            <span className="text-xs font-black tracking-widest text-gray-400 mb-6">BUSINESS SCORE</span>
                            <div className="relative w-48 h-48 flex items-center justify-center mb-6">
                                <svg className="absolute w-full h-full transform -rotate-90">
                                    <circle cx="96" cy="96" r="88" stroke="#f1f5f9" strokeWidth="16" fill="transparent" />
                                    <circle 
                                        cx="96" cy="96" r="88" 
                                        stroke={results.score >= 90 ? "#10b981" : results.score >= 80 ? "#6366f1" : results.score >= 70 ? "#f59e0b" : "#f43f5e"} 
                                        strokeWidth="16" fill="transparent" strokeDasharray={553}
                                        strokeDashoffset={553 - (553 * results.score) / 100}
                                        strokeLinecap="round" className="transition-all duration-1000 ease-out"
                                    />
                                </svg>
                                <div className="text-center relative z-10 flex flex-col items-center">
                                    <span className="text-6xl font-black text-brand tracking-tighter">{results.score}</span>
                                    <span className="text-sm font-bold text-gray-400">out of 100</span>
                                </div>
                            </div>
                            <span className={`px-5 py-2 rounded-full text-sm font-black border uppercase tracking-wider ${getScoreColor(results.score)}`}>
                                {results.label}
                            </span>
                        </div>

                        {/* Narrative */}
                        <div className="md:col-span-8 space-y-6">
                            <div>
                                <div className="flex items-center gap-2 text-brand-accent font-bold text-sm mb-2">
                                    <i className="fa-regular fa-id-card"></i>
                                    <span>{platform} • {results.businessName}</span>
                                </div>
                                <h2 className="text-3xl sm:text-4xl font-black text-brand tracking-tight">Social Media Health Report</h2>
                            </div>
                            
                            <p className="text-gray-600 font-medium text-lg leading-relaxed bg-gray-50 p-5 rounded-2xl border border-gray-100">
                                "{results.summary}"
                            </p>

                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 pt-2">
                                <div className="p-4 rounded-2xl border border-gray-100">
                                    <p className="text-[10px] text-gray-400 font-black uppercase mb-1">Growth Potential</p>
                                    <p className="text-base font-black text-brand">{results.growthPotential}</p>
                                </div>
                                <div className="p-4 rounded-2xl border border-gray-100">
                                    <p className="text-[10px] text-gray-400 font-black uppercase mb-1">Data Coverage</p>
                                    <p className="text-base font-black text-brand">{results.dataCoverage}%</p>
                                </div>
                                <div className="col-span-2 sm:col-span-1 p-4 rounded-2xl border border-gray-100">
                                    <p className="text-[10px] text-gray-400 font-black uppercase mb-1">Audit Credibility</p>
                                    <p className="text-base font-black text-emerald-600 flex items-center gap-2">
                                        <i className="fa-solid fa-circle-check"></i>
                                        {results.dataCoverage >= 80 ? 'High' : results.dataCoverage >= 60 ? 'Medium' : 'Fair'}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>


                    {/* Two Columns: Strengths & Opportunities */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* Strengths */}
                        <div className="bg-white rounded-[2rem] border border-gray-200 p-8 shadow-soft">
                            <h3 className="text-xl font-black text-brand mb-1 flex items-center gap-3">
                                <span className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-sm"><i className="fa-solid fa-check"></i></span>
                                Key Strengths
                            </h3>
                            <p className="text-sm text-gray-400 font-medium mb-6 ml-11">What you're already doing great.</p>
                            
                            <ul className="space-y-3 ml-11">
                                {results.strengths.map((item, index) => (
                                    <li key={index} className="flex items-start gap-3">
                                        <i className="fa-solid fa-circle-check text-emerald-500 mt-1"></i>
                                        <span className="text-gray-700 font-medium text-base">{item.replace('✓', '').trim()}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* Opportunities */}
                        <div className="bg-white rounded-[2rem] border border-gray-200 p-8 shadow-soft">
                            <h3 className="text-xl font-black text-brand mb-1 flex items-center gap-3">
                                <span className="w-8 h-8 rounded-full bg-amber-100 text-amber-500 flex items-center justify-center text-sm"><i className="fa-solid fa-exclamation"></i></span>
                                Priority Opportunities
                            </h3>
                            <p className="text-sm text-gray-400 font-medium mb-6 ml-11">Crucial gaps limiting potential buyers.</p>
                            
                            <ul className="space-y-3 ml-11">
                                {results.opportunities.map((item, index) => (
                                    <li key={index} className="flex items-start gap-3">
                                        <i className="fa-solid fa-arrow-right text-amber-500 mt-1"></i>
                                        <span className="text-gray-700 font-medium text-base">{item.replace('•', '').trim()}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>


                    {/* Categories Breakdown */}
                    <div className="bg-white rounded-[2rem] border border-gray-200 p-8 shadow-soft">
                        <div className="mb-8">
                            <h3 className="text-2xl font-black text-brand">Score Breakdown by Category</h3>
                            <p className="text-gray-500 font-medium mt-1">Specific benchmarks evaluated from your public profile.</p>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                            {[
                                { title: 'Profile Clarity', score: results.categories.profileClarity, desc: 'How quickly customers understand your business.' },
                                { title: 'Content Quality', score: results.categories.contentQuality, desc: 'Visual neatness and message consistency.' },
                                { title: 'Trust Score', score: results.categories.trustScore, desc: 'Presence of reviews, website, and legal info.' },
                                { title: 'Engagement', score: results.categories.customerEngagement, desc: 'Ease of inviting Q&A and active replies.' },
                                { title: 'Readiness', score: results.categories.businessReadiness, desc: 'How practical the purchasing flow is.' }
                            ].map((cat, i) => (
                                <div key={i} className="flex flex-col border border-gray-100 rounded-2xl p-5 bg-gray-50/50">
                                    <span className="text-xs font-black text-gray-400 uppercase tracking-widest mb-1">{cat.title}</span>
                                    <p className="text-xs text-gray-500 font-medium mb-4 flex-grow">{cat.desc}</p>
                                    
                                    <div>
                                        <div className="flex items-baseline gap-1 mb-2">
                                            <span className="text-2xl font-black text-brand">{cat.score}</span>
                                            <span className="text-xs font-bold text-gray-400">/100</span>
                                        </div>
                                        <div className="w-full bg-gray-200 h-1.5 rounded-full">
                                            <div className={`h-full rounded-full ${getProgressColor(cat.score)}`} style={{ width: `${cat.score}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>


                    {/* Recommendations */}
                    <div className="bg-brand text-white rounded-[2rem] p-8 sm:p-10 shadow-lg">
                        <div className="mb-8">
                            <span className="text-xs text-emerald-400 font-black uppercase tracking-widest">Quick Actions</span>
                            <h3 className="text-2xl sm:text-3xl font-black mt-2">Tactical Steps You Can Take Today</h3>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {results.recommendations.map((rec, i) => (
                                <div key={i} className="bg-white/10 backdrop-blur-sm border border-white/10 p-6 rounded-2xl relative">
                                    <div className="w-8 h-8 rounded-full bg-white text-brand font-black flex items-center justify-center text-sm mb-4">
                                        {i+1}
                                    </div>
                                    <p className="text-base font-semibold text-gray-100 leading-relaxed">
                                        {rec}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>


                    {/* Lead Gen Section */}
                    <div className="bg-white border-2 border-gray-900 rounded-[2rem] p-8 sm:p-12 shadow-2xl grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                        <div className="space-y-6">
                            <div className="inline-flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-full text-xs font-black tracking-widest text-brand uppercase">
                                <i className="fa-solid fa-file-pdf"></i>
                                Free Detailed Audit
                            </div>
                            <h3 className="text-3xl sm:text-4xl font-black text-brand leading-tight tracking-tight">
                                Want a Detailed Audit & Growth Strategy Session?
                            </h3>
                            <p className="text-gray-600 font-medium text-lg leading-relaxed">
                                Get a manual review by our agency experts. We'll check every link and provide a clear roadmap to turn your profile into a customer-generating machine.
                            </p>
                            <ul className="space-y-3 font-bold text-sm text-gray-700">
                                <li className="flex items-center gap-3"><i className="fa-solid fa-check text-emerald-500 text-lg"></i> 10+ page PDF report</li>
                                <li className="flex items-center gap-3"><i className="fa-solid fa-check text-emerald-500 text-lg"></i> 30-minute private Zoom consultation</li>
                                <li className="flex items-center gap-3"><i className="fa-solid fa-check text-emerald-500 text-lg"></i> Local competitor analysis</li>
                            </ul>
                        </div>

                        <div className="bg-gray-50 p-8 rounded-[1.5rem] border border-gray-200">
                            {!leadSubmitted ? (
                                <form onSubmit={handleLeadSubmit} className="space-y-5">
                                    <div className="mb-2">
                                        <h4 className="text-xl font-black text-brand">Book Your Free Call</h4>
                                        <p className="text-sm text-gray-500 font-medium">Fill out the form below to get started.</p>
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs font-black text-gray-500 uppercase tracking-wider block mb-1.5">Full Name</label>
                                            <input type="text" required placeholder="John Doe" value={leadData.name} onChange={(e) => setLeadData({...leadData, name: e.target.value})} className="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent font-medium" />
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs font-black text-gray-500 uppercase tracking-wider block mb-1.5">Business Email</label>
                                                <input type="email" required placeholder="john@company.com" value={leadData.email} onChange={(e) => setLeadData({...leadData, email: e.target.value})} className="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent font-medium" />
                                            </div>
                                            <div>
                                                <label className="text-xs font-black text-gray-500 uppercase tracking-wider block mb-1.5">Phone Number</label>
                                                <input type="tel" required placeholder="+1 (555) 000-0000" value={leadData.phone} onChange={(e) => setLeadData({...leadData, phone: e.target.value})} className="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent font-medium" />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-xs font-black text-gray-500 uppercase tracking-wider block mb-1.5">Company Name</label>
                                            <input type="text" required placeholder="Doe Bakery LLC" value={leadData.company} onChange={(e) => setLeadData({...leadData, company: e.target.value})} className="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent font-medium" />
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-brand hover:bg-black text-white font-black py-4 rounded-xl shadow-md transition duration-200 text-base mt-2">
                                        Request Full Report
                                    </button>
                                    <p className="text-[10px] text-center text-gray-400 font-medium">
                                        Your data is secure. We never share your email or phone number with third parties.
                                    </p>
                                </form>
                            ) : (
                                <div className="text-center py-10 px-4 space-y-4">
                                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto text-3xl">
                                        <i className="fa-solid fa-circle-check"></i>
                                    </div>
                                    <h4 className="text-2xl font-black text-brand">Request Sent!</h4>
                                    <p className="text-gray-500 text-sm font-medium">
                                        Thank you, <span className="font-bold text-brand">{leadData.name}</span>.
                                    </p>
                                    <p className="text-sm text-gray-600 leading-relaxed max-w-sm mx-auto">
                                        Our senior consultants are preparing your detailed PDF analysis. We will contact you at <span className="font-bold text-brand">{leadData.phone}</span> within 24 hours to schedule your free consultation.
                                    </p>
                                    <button onClick={resetAnalyzer} className="text-brand font-bold text-sm border-b-2 border-brand hover:text-black hover:border-black mt-4 transition-colors">
                                        Check Another Profile
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
