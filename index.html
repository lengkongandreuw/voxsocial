<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox Social Score - AI-Powered Social Media Audit</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#06021c',
                            bgLight: '#0d0735',
                            accent: '#ff007f', // hot pink
                            neonBlue: '#00f0ff', // neon cyan
                            gold: '#ffb800', // gold stars
                            purpleGlow: '#6c22ff',
                        }
                    },
                    fontFamily: {

                        brush: ['Caveat Brush', 'Caveat', 'cursive'],

            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Caveat+Brush&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #06021c;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* Custom Neon Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #06021c; }
        ::-webkit-scrollbar-thumb { background: #22125b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff007f; }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .neon-text-glow {
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.4), 0 0 30px rgba(255, 123, 0, 0.2);
        }

        .glassmorphic {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .neon-border-input {
            border: 1.5px solid rgba(108, 34, 255, 0.4);
            box-shadow: 0 0 15px rgba(108, 34, 255, 0.1);
            transition: all 0.3s ease;
        }

        .neon-border-input:focus-within {
            border-color: #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);

</head>
<body class="antialiased">

    <div id="root"></div>

    <!-- React & Babel CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.10/babel.min.js" crossorigin></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const apiKey = ""; 

        // Official Image Assets
        const MASCOT_URL = "https://raw.githubusercontent.com/lengkongandreuw/voxsocial/main/assets/ryanvox.png";
        const LOGO_URL = "https://raw.githubusercontent.com/lengkongandreuw/voxsocial/main/assets/vsllogo.png";
        const HEADLINE_PNG_URL = "https://raw.githubusercontent.com/lengkongandreuw/voxsocial/main/assets/headline.png";

        // --- THREE.JS BACKGROUND COMPONENT ---
        const ThreeBackground = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x06021c, 0.002);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 32;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mountRef.current.appendChild(renderer.domElement);

                // Deep space space particles
                const geometry = new THREE.BufferGeometry();
                const particlesCount = 140;
                const posArray = new Float32Array(particlesCount * 3);

                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 85;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.22,
                    color: 0x6c22ff, // Purple/blue particles
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending
                });

                const particlesMesh = new THREE.Points(geometry, material);
                scene.add(particlesMesh);

                let mouseX = 0;
                let mouseY = 0;
                
                const handleMouseMove = (e) => {
                    mouseX = (e.clientX / window.innerWidth) - 0.5;
                    mouseY = (e.clientY / window.innerHeight) - 0.5;
                };
                window.addEventListener('mousemove', handleMouseMove);

                const animate = () => {
                    requestAnimationFrame(animate);
                    particlesMesh.rotation.y += 0.0004;
                    particlesMesh.rotation.x += 0.0002;
                    
                    particlesMesh.position.x += (mouseX * 4 - particlesMesh.position.x) * 0.05;
                    particlesMesh.position.y += (-mouseY * 4 - particlesMesh.position.y) * 0.05;

                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('resize', handleResize);
                    mountRef.current?.removeChild(renderer.domElement);
                    geometry.dispose();
                    material.dispose();
                    renderer.dispose();
                };
            }, []);

            return <div id="canvas-container" ref={mountRef}></div>;
        };

        function App() {
            const [view, setView] = useState('landing'); 
            const [profileUrl, setProfileUrl] = useState('');
            const [inputError, setInputError] = useState('');
            const [analyzingStep, setAnalyzingStep] = useState(0);
            const [analysisResults, setAnalysisResults] = useState(null);

            // Audit log sequences updated to English
            const analysisSteps = [
                "Establishing secure connection to public nodes...",
                "Retrieving Instagram bio, links, and public metadata...",
                "Analyzing first-impression and profile layout clarity...",
                "Evaluating content structure and visual branding consistency...",
                "Assessing engagement metrics and customer trust signals...",
                "Calculating final score and assembling growth action plan..."
            ];

            useEffect(() => {
                let interval;
                if (view === 'loading') {
                    setAnalyzingStep(0);
                    interval = setInterval(() => {
                        setAnalyzingStep((prev) => {
                            if (prev < analysisSteps.length - 1) {
                                return prev + 1;
                            } else {
                                clearInterval(interval);
                                return prev;
                            }
                        });
                    }, 1200);
                }
                return () => clearInterval(interval);
            }, [view]);

            const detectPlatform = (url) => {
                const lower = url.toLowerCase();
                if (lower.includes('instagram.com')) return 'Instagram';
                return 'Social Media Profile';
            };

            const handleAnalyze = async (e) => {
                e.preventDefault();
                setInputError('');

                const url = profileUrl.trim();
                if (!url) return;

                const isUrl = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?(\?.*)?$/.test(url);
                const isInstagram = url.toLowerCase().includes('instagram.com') || url.toLowerCase().includes('instagr.am');

                if (!isUrl) {
                    setInputError("Please enter a valid profile URL.");
                    return;
                }

                if (!isInstagram) {
                    setInputError("Audit restricted to Instagram links only. Please enter a valid Instagram profile URL.");
                    return;
                }

                setView('loading');
                const platform = 'Instagram';
                
                const systemPrompt = `You are a senior digital business auditor evaluating social media profiles for non-technical conventional business owners (aged 40-65).
Use SIMPLE, friendly, professional, and easy-to-understand ENGLISH.
Output format must be pure JSON with the following structure without extra markdown:
{
  "businessName": "Detected Business Name or Handle from URL",
  "profileIdentity": "One single sentence summarizing exactly WHO this profile is or what business they do (e.g., 'This profile belongs to a local coffee shop offering artisanal blends.').",
  "score": 40-95,
  "label": "Excellent" (90-100) or "Very Good" (80-89) or "Good" (70-79) or "Fair" (60-69) or "Needs Attention" (below 60),
  "summary": "One friendly summary line highlighting potential and main improvement areas (max 100 chars).",
  "strengths": ["Max 3 main strengths in English starting with a checkmark (✓)."],
  "opportunities": ["Max 3 improvement opportunities starting with a bullet (•)."],
  "recommendations": ["3 actionable recommendations. Each MUST be ONE sentence with a maximum of 20 words."],
  "categories": {
    "profileClarity": 25, "contentQuality": 25, "trustScore": 20, "customerEngagement": 15, "businessReadiness": 15
  },
  "growthPotential": "Low" | "Moderate" | "High" | "Very High",
  "dataCoverage": 50-95
}`;

                const userQuery = `Analyze the ${platform} profile with URL: ${url}. Provide a digital business readiness report.`;

                try {
                    let responseText = "";
                    let success = false;
                    
                    if (apiKey) {
                        try {
                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: userQuery }] }],
                                    systemInstruction: { parts: [{ text: systemPrompt }] },
                                    generationConfig: { responseMimeType: "application/json" }
                                })
                            });
                            
                            if (response.ok) {
                                const data = await response.json();
                                responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                                if (responseText) success = true;
                            }
                        } catch (e) {}
                    }

                    let finalData = success ? JSON.parse(responseText) : generateSimulatedResults(url, platform);

                    setTimeout(() => {
                        setAnalysisResults(finalData);
                        setView('results');
                    }, 1500);

                } catch (error) {
                    setAnalysisResults(generateSimulatedResults(url, platform));
                    setView('results');
                }
            };

            const generateSimulatedResults = (url, platform) => {
                const hash = url.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const score = 68 + (hash % 24); 
                
                return {
                    businessName: "Your Instagram Business Profile",
                    profileIdentity: "This profile appears to belong to an active commercial enterprise operating on Instagram.",
                    score: score,
                    label: score >= 90 ? "Excellent" : score >= 80 ? "Very Good" : score >= 70 ? "Good" : "Fair",
                    summary: "Your profile has a solid foundation. Focusing on clear calls-to-action will immediately boost trust and conversions.",
                    strengths: [
                        "✓ Visual identity looks mostly consistent",
                        "✓ Product presentation is clear",
                        "✓ Profile is active and reachable"
                    ],
                    opportunities: [
                        "• Direct contact links are hard to find",
                        "• Bio description lacks a strong value proposition",
                        "• Customer engagement strategy needs optimization"
                    ],
                    recommendations: [
                        "Simplify your bio so customers understand your exact service in under 5 seconds.",
                        "Add a prominent WhatsApp or booking link directly in your profile.",
                        "Create pinned content highlighting customer reviews and FAQs."
                    ],
                    categories: {
                        profileClarity: 70 + (hash % 20),
                        contentQuality: 65 + ((hash + 2) % 25),
                        trustScore: 60 + ((hash + 4) % 30),
                        customerEngagement: 55 + ((hash + 6) % 35),
                        businessReadiness: 50 + ((hash + 8) % 40)
                    },
                    growthPotential: score > 80 ? "High" : "Moderate",
                    dataCoverage: 82 + (hash % 15)
                };
            };

            return (
                <div className="min-h-screen flex flex-col font-sans bg-gradient-to-b from-[#06021c] to-[#0c0529] text-white relative">
                    {view === 'landing' && <ThreeBackground />}

                    <main className="flex-grow flex flex-col relative z-10">
                        {view === 'landing' && (
                            <LandingSection 
                                profileUrl={profileUrl} 
                                setProfileUrl={setProfileUrl} 
                                handleAnalyze={handleAnalyze} 
                                inputError={inputError}
                                setInputError={setInputError}
                            />
                        )}

                        {view === 'loading' && (
                            <LoadingSection currentStep={analyzingStep} steps={analysisSteps} />
                        )}

                        {view === 'results' && analysisResults && (
                            <ResultsSection 
                                results={analysisResults} 
                                url={profileUrl}
                                platform={detectPlatform(profileUrl)}
                                setView={setView}
                            />
                        )}
                    </main>
                </div>
            );
        }

        // ==========================================
        // 1. LANDING VIEW (Rebuilt Visual Poster Layout)
        // ==========================================
        function LandingSection({ profileUrl, setProfileUrl, handleAnalyze, inputError, setInputError }) {
            const mascotRef = useRef(null);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!mascotRef.current) return;
                    const x = (window.innerWidth / 2 - e.pageX) / 60;
                    const y = (window.innerHeight / 2 - e.pageY) / 60;
                    mascotRef.current.style.transform = `perspective(1000px) rotateY(${-x}deg) rotateX(${y}deg)`;
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div className="relative min-h-screen flex flex-col justify-between overflow-x-hidden">
                    
                    {/* Neon Ambient Background Lights */}
                    <div className="absolute top-[10%] left-[-10%] w-[35vw] h-[35vw] rounded-full bg-cyber-purpleGlow/25 blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-[20%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-[#191046]/45 blur-[150px] pointer-events-none"></div>

                    {/* Navigation Header - Cleaned up to show only Logo and Booking CTA */}
                    <header className="absolute top-0 left-0 w-full p-6 sm:px-12 z-50 flex items-center justify-between">
                        <div className="flex items-center gap-3 font-black text-xl tracking-tight text-white select-none">
                            <div className="w-8 h-8 rounded-full overflow-hidden flex items-center justify-center">
                                <img src={LOGO_URL} className="w-full h-full object-contain" alt="Logo" />
                            </div>
                            VOXLUMEDIA
                        </div>
                        <a href="https://voxlumedia.com" target="_blank" rel="noopener noreferrer" className="bg-[#191046]/60 backdrop-blur-md border border-white/10 rounded-full px-5 py-2.5 text-xs sm:text-sm font-extrabold hover:bg-[#191046]/90 hover:border-white/20 transition-all">
                            Book Free Consultation &rarr;
                        </a>
                    </header>

                    {/* Central Hero Body */}
                    <div className="flex-grow flex items-center justify-center w-full pt-32 pb-16 relative z-10">
                        <div className="w-full max-w-[1400px] mx-auto px-6 sm:px-12 grid grid-cols-1 lg:grid-cols-12 items-center gap-12 lg:gap-4">
                            
                            {/* LEFT SIDE: Mascot + Floating AI Insights Badge */}
                            <div className="lg:col-span-5 flex flex-col items-center justify-center relative">
                                <div 
                                    ref={mascotRef}
                                    className="w-full h-auto transition-transform duration-300 ease-out flex justify-center relative z-20"
                                >
                                    <div className="absolute inset-0 bg-cyber-neonBlue/15 blur-[100px] rounded-full"></div>
                                    <img 
                                        src={MASCOT_URL} 
                                        alt="Vox Mascot" 
                                        className="w-[85%] sm:w-[65%] lg:w-[100%] max-w-[500px] h-auto object-contain drop-shadow-[0_35px_50px_rgba(0,0,0,0.65)] animate-float"
                                    />
                                </div>

                                {/* Floating Glass Card: "AI-POWERED INSIGHTS" */}
                                <div className="absolute bottom-[2%] left-[-2%] sm:left-[5%] lg:left-[-5%] z-40 max-w-[240px] glassmorphic p-4 rounded-2xl border border-white/10 shadow-2xl flex gap-3 animate-float" style={{animationDelay: '1.5s'}}>
                                    <div className="w-10 h-10 rounded-xl bg-cyber-purpleGlow/25 flex items-center justify-center text-cyber-neonBlue shrink-0">
                                        <i className="fa-solid fa-brain text-lg"></i>
                                    </div>
                                    <div className="space-y-1">
                                        <h4 className="text-[11px] font-black uppercase tracking-wider text-white">AI-POWERED INSIGHTS</h4>
                                        <p className="text-[10px] text-white/70 font-semibold leading-normal">
                                            Advanced neural audit engine scans profile metrics and content structures instantly.
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* RIGHT SIDE: Typography & CTA */}
                            <div className="lg:col-span-7 space-y-8 text-center lg:text-left animate-fade-in-up relative z-30">
                                
                                <div className="space-y-4">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] sm:text-xs font-black tracking-widest text-[#a882ff] uppercase">
                                        <i className="fa-solid fa-bolt text-cyber-accent"></i>
                                        AI-POWERED SOCIAL MEDIA AUDIT
                                    </div>
                                    
                                    <h1 className="text-[2.8rem] sm:text-6xl lg:text-[5.4rem] font-black uppercase leading-[1.0] tracking-tighter text-white">
                                        VOX SOCIAL <br />
                                        <span className="bg-gradient-to-r from-orange-400 via-pink-500 to-cyber-accent bg-clip-text text-transparent neon-text-glow">SCORE</span>
                                    </h1>
                                    
                                    <p className="text-white/80 text-sm sm:text-lg lg:text-[20px] max-w-[620px] mx-auto lg:mx-0 font-medium leading-relaxed">
                                        Get an instant visual snapshot of how easily potential customers trust and purchase products from your Instagram profile.
                                    </p>
                                </div>

                                {/* Form Input with Neon Border and Character limit */}
                                <form onSubmit={handleAnalyze} className="relative w-full max-w-[650px] mx-auto lg:mx-0 space-y-3 pt-2">
                                    <div className="flex flex-col sm:flex-row gap-2.5 bg-white/5 p-2 rounded-2xl border border-white/10 backdrop-blur-xl shadow-2xl relative">
                                        <div className="relative flex-grow flex items-center px-4">
                                            <span className="text-white/40 text-xl font-black mr-2 font-mono">@</span>
                                            <input 
                                                type="url" 
                                                required
                                                maxLength={100}
                                                value={profileUrl}
                                                onChange={(e) => {
                                                    setInputError('');
                                                    setProfileUrl(e.target.value);
                                                }}
                                                placeholder="Enter your public Instagram Business URL"
                                                className="w-full bg-transparent text-white font-bold placeholder-white/40 focus:outline-none text-[15px] sm:text-base py-3"
                                            />
                                        </div>
                                        <button 
                                            type="submit" 
                                            className="bg-gradient-to-r from-orange-500 via-pink-500 to-cyber-accent hover:opacity-95 text-white font-black px-10 py-4 rounded-xl transition-all duration-300 text-sm whitespace-nowrap shadow-lg flex items-center justify-center gap-2"
                                        >
                                            Get My Score <i className="fa-solid fa-arrow-right"></i>
                                        </button>
                                    </div>

                                    {/* Arrow Note Pointer */}
                                    <div className="hidden md:flex absolute right-[-140px] top-[15px] items-center gap-2 pointer-events-none animate-bounce" style={{animationDuration: '3s'}}>
                                        <svg className="w-12 h-12 text-cyber-accent rotate-[-20deg]" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                                        </svg>
                                        <span className="text-xs font-brush text-cyber-accent text-medium tracking-wide rotate-[-5deg]">Start your free audit!</span>
                                    </div>

                                    {/* Verification Badges Row */}
                                    <div className="flex flex-wrap items-center justify-center lg:justify-start gap-x-6 gap-y-2 text-xs font-bold text-white/70 pt-1">
                                        <span className="flex items-center gap-1.5"><i className="fa-solid fa-circle-check text-cyber-neonBlue"></i> No credit card required</span>
                                        <span className="flex items-center gap-1.5"><i className="fa-solid fa-circle-check text-cyber-neonBlue"></i> Free instant report</span>
                                        <span className="flex items-center gap-1.5"><i className="fa-solid fa-circle-check text-cyber-neonBlue"></i> Finished in 60s</span>
                                    </div>

                                    {/* Character counter / Instagram constraint alert */}
                                    <div className="flex justify-between items-center text-[11px] text-white/40 font-semibold px-2">
                                        <span>Exclusively Optimized for Instagram</span>
                                        <span>{profileUrl.length}/100 characters</span>
                                    </div>

                                    {/* Error Notification */}
                                    {inputError && (
                                        <div className="bg-rose-500/20 border border-rose-500/40 text-rose-300 px-4 py-3 rounded-xl text-sm font-semibold flex items-center gap-2 mt-2 w-max mx-auto lg:mx-0 animate-fade-in-up">
                                            <i className="fa-solid fa-circle-exclamation text-rose-400"></i>
                                            <span>{inputError}</span>
                                        </div>
                                    )}
                                </form>

                            </div>

                        </div>
                    </div>

                    {/* Bottom Stats Card panel */}
                    <div className="w-full relative z-30 px-6 sm:px-12 pb-10">
                        <div className="max-w-[1300px] mx-auto glassmorphic rounded-[2.5rem] p-8 grid grid-cols-1 md:grid-cols-12 gap-8 items-center border border-white/10 shadow-2xl">
                            
                            {/* Stat 1: Trusted by */}
                            <div className="md:col-span-3 flex items-center gap-4 justify-center md:justify-start">
                                <div className="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-cyber-neonBlue text-xl">
                                    <i className="fa-solid fa-users"></i>
                                </div>
                                <div className="space-y-0.5">
                                    <p className="text-[10px] font-black uppercase text-white/50 tracking-wider">TRUSTED BY</p>
                                    <p className="text-lg font-black text-white">120+ Businesses</p>
                                </div>
                            </div>

                            {/* Stat 2: Rating */}
                            <div className="md:col-span-3 flex items-center gap-4 justify-center">
                                <div className="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-cyber-gold text-xl">
                                    <i className="fa-solid fa-star"></i>
                                </div>
                                <div className="space-y-0.5">
                                    <p className="text-[10px] font-black uppercase text-white/50 tracking-wider">AVERAGE RATING</p>
                                    <div className="flex items-center gap-1.5">
                                        <span className="text-lg font-black text-white">4.9/5</span>
                                        <div className="flex gap-0.5 text-[10px] text-cyber-gold">
                                            <i className="fa-solid fa-star"></i>
                                            <i className="fa-solid fa-star"></i>
                                            <i className="fa-solid fa-star"></i>
                                            <i className="fa-solid fa-star"></i>
                                            <i className="fa-solid fa-star"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Stat 3: Posts analyzed */}
                            <div className="md:col-span-3 flex items-center gap-4 justify-center">
                                <div className="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-pink-400 text-xl">
                                    <i className="fa-solid fa-chart-line"></i>
                                </div>
                                <div className="space-y-0.5">
                                    <p className="text-[10px] font-black uppercase text-white/50 tracking-wider">POSTS ANALYZED</p>
                                    <p className="text-lg font-black text-white">5M+ Across Platforms</p>
                                </div>
                            </div>

                            {/* Supported Platforms icons list */}
                            <div className="md:col-span-3 flex flex-col items-center md:items-end justify-center gap-2">
                                <p className="text-[10px] font-black uppercase text-white/50 tracking-wider">SUPPORTED PLATFORMS</p>
                                <div className="flex items-center gap-3.5 text-lg text-white/70">
                                    <i className="fa-brands fa-instagram text-pink-400 hover:text-white cursor-pointer transition-colors scale-125" title="Exclusively Optimized"></i>
                                    <i className="fa-brands fa-tiktok hover:text-white cursor-pointer transition-colors opacity-40"></i>
                                    <i className="fa-brands fa-facebook hover:text-white cursor-pointer transition-colors opacity-40"></i>
                                    <i className="fa-brands fa-linkedin hover:text-white cursor-pointer transition-colors opacity-40"></i>
                                    <i className="fa-brands fa-youtube hover:text-white cursor-pointer transition-colors opacity-40"></i>
                                </div>
                            </div>

                        </div>

                        {/* Revised Copyright Footer */}
                        <div className="mt-8 text-center text-xs text-white/40 font-semibold tracking-wide">
                            Copyright © 2026 Voxlumedia™ | Creative Agency for Digital Marketing
                        </div>
                    </div>

                </div>
            );
        }

        // ==========================================
        // 2. LOADING SCREEN
        // ==========================================
        function LoadingSection({ currentStep, steps }) {
            const progressPercentage = Math.round(((currentStep + 1) / steps.length) * 100);

            return (
                <div className="min-h-screen bg-[#06021c] flex flex-col items-center justify-center p-6 relative z-10">
                    <div className="max-w-md w-full glassmorphic p-10 rounded-3xl border border-white/10 shadow-2xl text-center space-y-8 animate-fade-in-up">
                        
                        <div className="relative w-28 h-28 mx-auto">
                            <div className="absolute inset-0 rounded-full border-4 border-white/5"></div>
                            <div className="absolute inset-0 rounded-full border-4 border-t-cyber-neonBlue border-r-cyber-accent animate-spin"></div>
                            <div className="absolute inset-2 flex items-center justify-center bg-[#0d0735] rounded-full">
                                <i className="fa-solid fa-robot text-cyber-neonBlue text-3xl animate-pulse"></i>
                            </div>
                        </div>

                        <div>
                            <h2 className="text-2xl font-black text-white mb-2">Analyzing Profile</h2>
                            <p className="text-white/70 font-medium text-sm">
                                Extracting public insights via Vox AI...
                            </p>
                        </div>

                        <div className="space-y-3">
                            <div className="flex justify-between text-xs font-bold text-white/50">
                                <span>PROGRESS</span>
                                <span className="text-cyber-neonBlue">{progressPercentage}%</span>
                            </div>
                            <div className="w-full bg-white/5 h-2 rounded-full overflow-hidden border border-white/5">
                                <div 
                                    className="bg-gradient-to-r from-cyber-neonBlue to-cyber-accent h-full rounded-full transition-all duration-500 ease-out" 
                                    style={{ width: `${progressPercentage}%` }}
                                ></div>
                            </div>
                            
                            <div className="pt-3 text-xs font-bold text-white/90 h-8 flex items-center justify-center">
                                <span className="animate-pulse">{steps[currentStep]}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. RESULTS DASHBOARD (Glossy Cyber Theme)
        // ==========================================
        function ResultsSection({ results, url, platform, setView }) {
            const [leadSubmitted, setLeadSubmitted] = useState(false);
            const [leadData, setLeadData] = useState({ name: '', email: '', phone: '', company: '' });

            const handleLeadSubmit = (e) => {
                e.preventDefault();
                setLeadSubmitted(true);
            };

            const getScoreColor = (score) => {
                if (score >= 90) return 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20';
                if (score >= 80) return 'text-blue-400 bg-blue-400/10 border-blue-400/20';
                if (score >= 70) return 'text-amber-400 bg-amber-400/10 border-amber-400/20';
                return 'text-rose-400 bg-rose-400/10 border-rose-400/20';
            };

            return (
                <div className="min-h-screen bg-gradient-to-b from-[#06021c] to-[#0c0529] text-white w-full relative z-20 pb-20">
                    
                    {/* Background Neon Spot Accents */}
                    <div className="absolute top-[5%] left-[-10%] w-[30vw] h-[30vw] rounded-full bg-cyber-purpleGlow/20 blur-[130px] pointer-events-none"></div>
                    <div className="absolute top-[40%] right-[-10%] w-[35vw] h-[35vw] rounded-full bg-cyber-accent/15 blur-[130px] pointer-events-none"></div>

                    {/* Top Result Navigation Header */}
                    <nav className="border-b border-white/10 bg-white/5 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-[1400px] mx-auto px-6 sm:px-12 py-5 flex items-center justify-between">
                            <div className="flex items-center gap-3 font-black text-xl cursor-pointer" onClick={() => setView('landing')}>
                                <div className="w-8 h-8 rounded-full overflow-hidden flex items-center justify-center">
                                    <img src={LOGO_URL} className="w-full h-full object-contain" alt="Logo" />
                                </div>
                                VOXLUMEDIA
                            </div>
                            <button onClick={() => setView('landing')} className="text-sm border border-white/20 hover:border-white bg-white/5 hover:bg-white/10 font-bold py-2.5 px-6 rounded-full transition duration-300">
                                Run New Scan &rarr;
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-5xl mx-auto py-12 px-6 space-y-10 animate-fade-in-up">
                        
                        {/* PERFORMANCE SUMMARY SECTION */}
                        <div className="glassmorphic rounded-[2.5rem] border border-white/10 p-8 sm:p-12 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-cyber-purpleGlow/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

                            <div className="text-center mb-10 relative z-10">
                                <span className="text-xs font-black tracking-widest text-cyber-neonBlue uppercase mb-2 block">Performance Summary</span>
                                <h2 className="text-3xl sm:text-4xl font-black text-white">Your Business Health Report</h2>
                                <p className="text-white/50 font-medium mt-2 flex items-center justify-center gap-2">
                                    <i className="fa-solid fa-chart-pie text-cyber-accent"></i> {platform} Analysis
                                </p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-12 gap-10 items-center relative z-10">
                                {/* Circular Gauge */}
                                <div className="md:col-span-5 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-white/5 pb-8 md:pb-0">
                                    <div className="relative w-48 h-48 flex items-center justify-center mb-6">
                                        <svg className="absolute w-full h-full transform -rotate-90">
                                            <circle cx="96" cy="96" r="88" stroke="rgba(255,255,255,0.03)" strokeWidth="12" fill="transparent" />
                                            <circle 
                                                cx="96" cy="96" r="88" 
                                                stroke={results.score >= 90 ? "#00f0ff" : results.score >= 80 ? "#60a5fa" : results.score >= 70 ? "#fbbf24" : "#ff007f"} 
                                                strokeWidth="12" fill="transparent" strokeDasharray={553}
                                                strokeDashoffset={553 - (553 * results.score) / 100}
                                                strokeLinecap="round" className="transition-all duration-1500 ease-out"
                                            />
                                        </svg>
                                        <div className="text-center relative z-10 flex flex-col items-center mt-2">
                                            <span className="text-6xl font-black text-white tracking-tighter">{results.score}</span>
                                            <span className="text-xs font-bold text-white/40 uppercase mt-1">Score / 100</span>
                                        </div>
                                    </div>
                                    <span className={`px-6 py-2 rounded-full text-sm font-black border uppercase tracking-wider ${getScoreColor(results.score)}`}>
                                        {results.label}
                                    </span>
                                </div>

                                {/* Narrative Report Description */}
                                <div className="md:col-span-7 space-y-6">
                                    <div className="bg-white/5 p-6 rounded-2xl border border-white/10 shadow-inner">
                                        <div className="mb-4 pb-4 border-b border-white/5">
                                            <span className="text-[10px] font-black tracking-widest text-cyber-neonBlue uppercase mb-1 block">Profile Identity</span>
                                            <p className="text-white font-bold text-lg leading-snug">
                                                {results.profileIdentity}
                                            </p>
                                        </div>
                                        <p className="text-white/80 font-medium text-base leading-relaxed italic">
                                            "{results.summary}"
                                        </p>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/5 border border-white/10 p-4 rounded-xl shadow-sm flex items-start gap-3">
                                            <i className="fa-solid fa-arrow-trend-up text-cyber-neonBlue mt-1"></i>
                                            <div>
                                                <p className="text-[10px] text-white/50 font-bold uppercase">Growth Potential</p>
                                                <p className="text-base font-black text-white">{results.growthPotential}</p>
                                            </div>
                                        </div>
                                        <div className="bg-white/5 border border-white/10 p-4 rounded-xl shadow-sm flex items-start gap-3">
                                            <i className="fa-solid fa-check-double text-cyber-accent mt-1"></i>
                                            <div>
                                                <p className="text-[10px] text-white/50 font-bold uppercase">Profile Readiness</p>
                                                <p className="text-base font-black text-white">{results.categories.businessReadiness}/100</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Strengths & Opportunities */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="glassmorphic rounded-3xl p-8 border border-white/10 shadow-sm hover:shadow-md transition-shadow">
                                <h3 className="text-xl font-black text-white mb-6 flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-emerald-400/10 text-emerald-400 flex items-center justify-center"><i className="fa-solid fa-check text-sm"></i></div>
                                    Key Strengths
                                </h3>
                                <ul className="space-y-4">
                                    {results.strengths.map((item, i) => (
                                        <li key={i} className="flex items-start gap-3 text-white/80 font-medium">
                                            <i className="fa-solid fa-circle-check text-emerald-400 mt-1"></i>
                                            {item.replace('✓', '').trim()}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            
                            <div className="glassmorphic rounded-3xl p-8 border border-white/10 shadow-sm hover:shadow-md transition-shadow">
                                <h3 className="text-xl font-black text-white mb-6 flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-amber-400/10 text-amber-400 flex items-center justify-center"><i className="fa-solid fa-lightbulb text-sm"></i></div>
                                    Opportunities
                                </h3>
                                <ul className="space-y-4">
                                    {results.opportunities.map((item, i) => (
                                        <li key={i} className="flex items-start gap-3 text-white/80 font-medium">
                                            <i className="fa-solid fa-arrow-right text-amber-400 mt-1"></i>
                                            {item.replace('•', '').trim()}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        {/* Metric Scores */}
                        <div className="glassmorphic text-white rounded-[2rem] p-8 sm:p-10 border border-white/10 shadow-2xl relative overflow-hidden">
                            <div className="absolute -right-20 -bottom-20 w-64 h-64 bg-white/5 rounded-full blur-3xl pointer-events-none"></div>
                            
                            <h3 className="text-2xl font-black mb-8 relative z-10">Metric Breakdown</h3>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-8 relative z-10">
                                {[
                                    { label: 'Profile Clarity', score: results.categories.profileClarity, icon: 'fa-id-badge', color: 'bg-cyber-neonBlue' },
                                    { label: 'Content Quality', score: results.categories.contentQuality, icon: 'fa-image', color: 'bg-cyber-accent' },
                                    { label: 'Trust Signals', score: results.categories.trustScore, icon: 'fa-shield-halved', color: 'bg-cyber-gold' }
                                ].map((cat, i) => (
                                    <div key={i} className="bg-white/5 border border-white/15 p-5 rounded-2xl">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-sm font-bold text-white/70 flex items-center gap-2">
                                                <i className={`fa-solid ${cat.icon} text-white/40`}></i> {cat.label}
                                            </span>
                                            <span className="text-xl font-black">{cat.score}</span>
                                        </div>
                                        <div className="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
                                            <div className={`h-full rounded-full ${cat.color}`} style={{ width: `${cat.score}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Lead Capture form */}
                        <div className="glassmorphic rounded-[2rem] border border-white/10 p-8 sm:p-12 shadow-2xl text-center relative overflow-hidden">
                            <div className="absolute -left-20 bottom-[-20%] w-72 h-72 bg-cyber-purpleGlow/20 rounded-full blur-[100px] pointer-events-none"></div>
                            
                            {!leadSubmitted ? (
                                <div className="max-w-xl mx-auto space-y-6 relative z-10">
                                    <div className="w-16 h-16 bg-white/5 border border-white/10 text-cyber-neonBlue rounded-full flex items-center justify-center mx-auto text-2xl mb-4">
                                        <i className="fa-solid fa-file-pdf"></i>
                                    </div>
                                    <h3 className="text-3xl font-black text-white">Get Your Complete PDF Report</h3>
                                    <p className="text-white/60 font-medium">Enter your details to receive a full breakdown and an invitation to a free 30-minute growth consultation with our experts.</p>
                                    
                                    <form onSubmit={handleLeadSubmit} className="space-y-4 pt-4 text-left">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <input type="text" required placeholder="Full Name" value={leadData.name} onChange={(e) => setLeadData({...leadData, name: e.target.value})} className="w-full border border-white/10 focus:border-cyber-neonBlue rounded-xl px-4 py-3.5 focus:outline-none bg-white/5 text-white font-bold" />
                                            <input type="email" required placeholder="Business Email" value={leadData.email} onChange={(e) => setLeadData({...leadData, email: e.target.value})} className="w-full border border-white/10 focus:border-cyber-neonBlue rounded-xl px-4 py-3.5 focus:outline-none bg-white/5 text-white font-bold" />
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <input type="tel" required placeholder="Phone Number" value={leadData.phone} onChange={(e) => setLeadData({...leadData, phone: e.target.value})} className="w-full border border-white/10 focus:border-cyber-neonBlue rounded-xl px-4 py-3.5 focus:outline-none bg-white/5 text-white font-bold" />
                                            <input type="text" required placeholder="Company Name" value={leadData.company} onChange={(e) => setLeadData({...leadData, company: e.target.value})} className="w-full border border-white/10 focus:border-cyber-neonBlue rounded-xl px-4 py-3.5 focus:outline-none bg-white/5 text-white font-bold" />
                                        </div>
                                        <button type="submit" className="w-full bg-gradient-to-r from-orange-500 via-pink-500 to-cyber-accent text-white font-black py-4 rounded-xl transition duration-300 shadow-md">
                                            Send Me The Report &rarr;
                                        </button>
                                    </form>
                                </div>
                            ) : (
                                <div className="py-10 space-y-4 relative z-10 animate-fade-in-up">
                                    <div className="w-20 h-20 bg-emerald-400/10 text-emerald-400 rounded-full flex items-center justify-center mx-auto text-4xl border border-emerald-400/20 shadow-xl">
                                        <i className="fa-solid fa-check"></i>
                                    </div>
                                    <h4 className="text-3xl font-black text-white">Success!</h4>
                                    <p className="text-white/60 font-medium max-w-md mx-auto">Your comprehensive report is being generated. Our team will reach out to you shortly to schedule your growth strategy session.</p>
                                </div>
                            )}
                        </div>

                        {/* Revised Copyright Footer */}
                        <div className="mt-8 text-center text-xs text-white/40 font-semibold tracking-wide">
                            Copyright © 2026 Voxlumedia™ | Creative Agency for Digital Marketing
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
